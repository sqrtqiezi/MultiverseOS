<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiverseOS UX Color Themes</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif; background:#0b1020; color:#e5e7eb; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { color:#94a3b8; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .card { border:1px solid #1f2937; border-radius:14px; overflow:hidden; background:#111827; }
    .head { padding:14px; font-weight:700; }
    .palette { display:grid; grid-template-columns: repeat(4,1fr); }
    .sw { height:56px; }
    .ui { padding:14px; display:flex; flex-direction:column; gap:10px; }
    .btn { border:0; padding:10px 12px; border-radius:10px; color:#fff; font-weight:600; cursor:pointer; }
    .meta { display:flex; justify-content:space-between; font-size:12px; color:#94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MultiverseOS 颜色主题探索</h1>
    <p>用于快速比较 UI 语义色系统在真实组件中的观感。</p>
    <div class="grid">
      <section class="card">
        <div class="head">Theme A · Console Calm</div>
        <div class="palette">
          <div class="sw" style="background:#0f172a"></div><div class="sw" style="background:#111827"></div><div class="sw" style="background:#22c55e"></div><div class="sw" style="background:#38bdf8"></div>
        </div>
        <div class="ui">
          <button class="btn" style="background:#22c55e">Run Compare</button>
          <button class="btn" style="background:#ef4444">View Failure</button>
          <div class="meta"><span>Warn #f59e0b</span><span>Muted #94a3b8</span></div>
        </div>
      </section>
      <section class="card">
        <div class="head">Theme B · Signal Focus</div>
        <div class="palette">
          <div class="sw" style="background:#111827"></div><div class="sw" style="background:#1e293b"></div><div class="sw" style="background:#14b8a6"></div><div class="sw" style="background:#0ea5e9"></div>
        </div>
        <div class="ui">
          <button class="btn" style="background:#14b8a6">Open Timeline</button>
          <button class="btn" style="background:#dc2626">Investigate</button>
          <div class="meta"><span>Warn #f59e0b</span><span>Muted #9ca3af</span></div>
        </div>
      </section>
      <section class="card">
        <div class="head">Theme C · Neutral Analytical</div>
        <div class="palette">
          <div class="sw" style="background:#0b1220"></div><div class="sw" style="background:#101826"></div><div class="sw" style="background:#3b82f6"></div><div class="sw" style="background:#22d3ee"></div>
        </div>
        <div class="ui">
          <button class="btn" style="background:#3b82f6">Filter Runs</button>
          <button class="btn" style="background:#e11d48">Critical Step</button>
          <div class="meta"><span>Warn #f97316</span><span>Muted #94a3b8</span></div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
